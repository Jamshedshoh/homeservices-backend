version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: homeservices_db
    environment:
      POSTGRES_USER: ${DB_USER:-homeservices}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-homeservices}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-homeservices}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homeservices_network

  api:
    build: .
    container_name: homeservices_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-homeservices}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-homeservices}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@example.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-changeme}
    ports:
      - "${API_PORT:-5001}:5001"
    volumes:
      - .:/app
    networks:
      - homeservices_network
    command: sh -c "python scripts/migrate.py && uvicorn main:app --host 0.0.0.0 --port 5001 --reload"

volumes:
  postgres_data:
    driver: local

networks:
  homeservices_network:
    driver: bridge
